<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Voter</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

    body {
      min-height:100vh;
      background: linear-gradient(135deg,#eef2ff,#fef9ff);
      display:flex;
      flex-direction:column;
    }

    .navbar {
      display:flex;
      justify-content:space-between;
      padding:15px 25px;
      background:rgba(255,255,255,0.7);
      backdrop-filter:blur(10px);
    }

    .nav-links a {
      margin-left:20px;
      text-decoration:none;
      color:#475569;
    }

    .wrapper {
      flex:1;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container {
      width:100%;
      max-width:380px;
      background:#fff;
      padding:28px;
      border-radius:16px;
      box-shadow:0 12px 30px rgba(0,0,0,0.08);
    }

    h2 { text-align:center; margin-bottom:20px; }

    input {
      width:100%;
      padding:10px;
      margin-bottom:12px;
      border-radius:8px;
      border:1px solid #c7d2fe;
    }

    button {
      width:100%;
      padding:10px;
      border:none;
      border-radius:8px;
      background:linear-gradient(135deg,#6366f1,#a855f7);
      color:white;
      cursor:pointer;
    }

    .link {
      text-align:center;
      margin-top:10px;
      font-size:13px;
    }

    .link a { color:#7c3aed; text-decoration:none; }

    .hidden { display:none; }
  </style>
</head>
<body>

  <div class="navbar">
    <div>Voting System</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="#">Help</a>
    </div>
  </div>

  <div class="wrapper">
    <div class="container">
      <h2>Login as Voter</h2>

      <input type="email" id="email" placeholder="Enter email" />
      <button onclick="sendOTP()">Get OTP</button>

      <div id="otpSection" class="hidden">
        <input type="text" id="otp" placeholder="Enter OTP" />
        <button onclick="verifyOTP()">Verify OTP</button>
      </div>

      <div class="link">
        Not registered? <a href="register-voter.html">Register</a>
      </div>

    </div>
  </div>

  <script>
    async function sendOTP() {
      const email = document.getElementById("email").value;

      const res = await fetch("http://your-ec2-url/api/auth/login-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });

      const data = await res.json();

      if (data.success) {
        alert("OTP sent");
        document.getElementById("otpSection").classList.remove("hidden");
      } else {
        alert(data.message);
      }
    }

    async function verifyOTP() {
      const email = document.getElementById("email").value;
      const otp = document.getElementById("otp").value;

      const res = await fetch("http://your-ec2-url/api/auth/login-verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, otp })
      });

      const data = await res.json();

      if (data.token) {
        // store token
        localStorage.setItem("token", data.token);

        alert("Login successful");

        // go to voter dashboard
        window.location.href = "voter-dashboard.html";
      } else {
        alert(data.message);
      }
    }
  </script>

</body>
</html>
