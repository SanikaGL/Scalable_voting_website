<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meet the Candidates</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f7f8fa;
      color: #222;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px 50px;
      background: rgb(148, 214, 182);
      border-bottom: 3px solid #060707;
      position: sticky;
      top: 0;
      z-index: 100;
      font-size:xx-large;
      font-display: block;
      font-style:normal ;
      text-shadow: #111827;
      text-shadow: #222;
      font-size:50% ;
    }

    nav h2 {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
    }

    nav button {
      background: #111827;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    nav button:hover {
      opacity: 0.9;
    }

    .page-header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    .page-header h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #111827;
    }

    .page-header p {
      font-size: 16px;
      color: #6b7280;
      max-width: 600px;
      margin: 0 auto;
    }

    #candidateContainer {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px 40px;
    }

    .candidate-card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .candidate-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
    }

    .candidate-img {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 14px;
      flex-shrink: 0;
      border: 1px solid #eee;
    }

    .candidate-info {
      flex: 1;
    }

    .candidate-info h3 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #111827;
    }

    .candidate-info p {
      font-size: 15px;
      line-height: 1.6;
      color: #4b5563;
      margin-bottom: 8px;
    }

    .vote-count {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 12px;
      background: #eef2ff;
      color: #3730a3;
      font-weight: 600;
      border-radius: 999px;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      nav {
        padding: 16px 20px;
      }

      nav h2 {
        font-size: 20px;
      }

      nav button {
        padding: 9px 14px;
        font-size: 13px;
      }

      .page-header h1 {
        font-size: 28px;
      }

      .candidate-card {
        flex-direction: column;
        align-items: flex-start;
      }

      .candidate-img {
        width: 100%;
        max-width: 280px;
        height: auto;
      }
    }
  </style>
</head>

<body>

  <nav>
    <h2>Candidate List</h2>
    <button onclick="goToLogin()">Login to Vote</button>
  </nav>

  

  <div id="candidateContainer"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="admin-page.js"></script>

  <script>
    function goToLogin() {
      // later you can replace this with your real login route
      window.location.href = "/login.html";
    }
  </script>

</body>
</html>
